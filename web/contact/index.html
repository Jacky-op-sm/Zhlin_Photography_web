<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Zhlin Photography</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="logo">
      <a href="../index.html" class="logo-link">
        <span class="logo-mark">ZL</span>
        <span class="logo-text">ZHLIN PHOTOGRAPHY</span>
      </a>
    </div>
    <nav class="main-nav">
      <a href="../index.html">ABOUT ME</a>
      <a href="../photography/index.html">PHOTOGRAPHY</a>
      <a href="../hobby/index.html">HOBBY</a>
      <a href="../travel/index.html">TRAVEL</a>
      <a href="index.html" class="nav-active nav-contact">CONTACT</a>
    </nav>
  </header>

  <main class="content content--wide">
    <section class="section contact-section contact-layout">
      <aside class="contact-info">
        <h1 class="contact-title">Let's chat.</h1>
        <a href="mailto:Jackylin714@gmail.com" class="contact-email">Jackylin714@gmail.com</a>
        <div class="contact-social">
          <a href="#" class="social-icon" aria-label="Instagram">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M16.98 2H7.02A5.03 5.03 0 0 0 2 7.02v9.96A5.03 5.03 0 0 0 7.02 22h9.96A5.03 5.03 0 0 0 22 16.98V7.02A5.03 5.03 0 0 0 16.98 2zm3.38 14.98a3.38 3.38 0 0 1-3.38 3.38H7.02a3.38 3.38 0 0 1-3.38-3.38V7.02a3.38 3.38 0 0 1 3.38-3.38h9.96a3.38 3.38 0 0 1 3.38 3.38v9.96z"></path>
              <path d="M12 6.84A5.16 5.16 0 1 0 17.16 12 5.17 5.17 0 0 0 12 6.84zm0 8.67A3.51 3.51 0 1 1 15.51 12 3.52 3.52 0 0 1 12 15.51z"></path>
              <circle cx="17.54" cy="6.46" r="1.24"></circle>
            </svg>
          </a>
          <a href="#" class="social-icon social-icon--text" aria-label="LinkedIn">in</a>
        </div>
      </aside>

      <form class="contact-form" action="#" method="post">
        <fieldset class="contact-fieldset">
          <legend>Name</legend>
          <div class="name-grid">
            <div class="form-group">
              <label for="first-name">First Name <span>(required)</span></label>
              <input id="first-name" name="first_name" type="text" autocomplete="given-name" required>
            </div>
            <div class="form-group">
              <label for="last-name">Last Name <span>(required)</span></label>
              <input id="last-name" name="last_name" type="text" autocomplete="family-name" required>
            </div>
          </div>
        </fieldset>

        <div class="form-group">
          <label for="email">Email <span>(required)</span></label>
          <input id="email" name="email" type="email" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label for="message">Message <span>(required)</span></label>
          <textarea id="message" name="message" rows="6" required></textarea>
        </div>

        <button type="submit" class="send-btn">SEND</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <button type="button" class="theme-toggle" id="theme-toggle" aria-label="切换深色/浅色模式">
      <span class="theme-label">浅色</span>
    </button>
  </footer>

  <script src="../script.js"></script>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
