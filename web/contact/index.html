<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="联系 Zhlin：影像合作、学术交流与创作讨论。">
  <link rel="canonical" href="https://zhlin-photography.vercel.app/contact/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Contact · Zhlin Photography">
  <meta property="og:description" content="通过邮件或表单联系我，通常 48 小时内回复。">
  <meta property="og:image" content="https://zhlin-photography.vercel.app/assets/profile/avatar.jpeg">
  <title>Contact · Zhlin Photography</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
</head>
<body data-page="contact" data-base-path=".." data-content-url="../data/site-content.json">
  <header class="site-header">
    <div class="logo">
      <a href="../index.html" class="logo-link">
        <span class="logo-mark">ZL</span>
        <span class="logo-text">ZHLIN PHOTOGRAPHY</span>
      </a>
    </div>
    <nav class="main-nav" aria-label="Main Navigation">
      <a href="../index.html">ABOUT ME</a>
      <a href="../photography/index.html">PHOTOGRAPHY</a>
      <a href="../hobby/index.html">HOBBY</a>
      <a href="../travel/index.html">TRAVEL</a>
      <a href="index.html" class="nav-active nav-contact">CONTACT</a>
    </nav>
  </header>

  <main class="content content--wide">
    <section class="section contact-section contact-layout">
      <aside class="contact-info">
        <h1 class="contact-title" id="contact-title">Let’s chat.</h1>
        <a id="contact-email" href="mailto:Jackylin714@gmail.com" class="contact-email">Jackylin714@gmail.com</a>
        <p class="contact-response-time" id="contact-response-time">通常在 48 小时内回复。</p>
        <div class="contact-social" id="contact-social" aria-label="Social links"></div>
      </aside>

      <form class="contact-form" id="contact-form" action="/api/contact" method="post" novalidate>
        <fieldset class="contact-fieldset">
          <legend>Name</legend>
          <div class="name-grid">
            <div class="form-group">
              <label for="first-name">First Name <span>(required)</span></label>
              <input id="first-name" name="first_name" type="text" autocomplete="given-name" required>
            </div>
            <div class="form-group">
              <label for="last-name">Last Name <span>(required)</span></label>
              <input id="last-name" name="last_name" type="text" autocomplete="family-name" required>
            </div>
          </div>
        </fieldset>

        <div class="form-group">
          <label for="email">Email <span>(required)</span></label>
          <input id="email" name="email" type="email" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label for="contact-type">Type <span>(required)</span></label>
          <select id="contact-type" name="type" required>
            <option value="">请选择类型</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Message <span>(required)</span></label>
          <textarea id="message" name="message" rows="6" required></textarea>
        </div>

        <div class="form-group form-group--hp" aria-hidden="true">
          <label for="website">Website</label>
          <input id="website" name="website" type="text" tabindex="-1" autocomplete="off">
        </div>

        <button type="submit" class="send-btn">SEND</button>
        <p class="form-status" id="contact-form-status" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <button type="button" class="theme-toggle" id="theme-toggle" aria-label="切换深色/浅色模式">
      <span class="theme-label">浅色</span>
    </button>
  </footer>

  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script src="../script.js"></script>
</body>
</html>
