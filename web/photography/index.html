<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Zhlin 的摄影作品精选，包含地点、时间与拍摄注释。">
  <link rel="canonical" href="https://zhlin-photography.vercel.app/photography/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Photography · Zhlin Photography">
  <meta property="og:description" content="Selected photography with notes on place, light, and time.">
  <meta property="og:image" content="https://zhlin-photography.vercel.app/assets/photos/学校的光影.jpeg">
  <title>Photography · Zhlin Photography</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <script>
    (function () {
      var key = "theme";
      var dark = "dark";
      var light = "light";
      var theme = light;

      try {
        var stored = localStorage.getItem(key);
        if (stored === dark || stored === light) {
          theme = stored;
        } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
          theme = dark;
        }
      } catch (error) {
        if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
          theme = dark;
        }
      }

      if (theme === dark) {
        document.documentElement.setAttribute("data-theme", dark);
      } else {
        document.documentElement.removeAttribute("data-theme");
      }
    })();
  </script>
</head>
<body data-page="photography" data-base-path=".." data-content-url="../data/site-content.json">
  <header class="site-header">
    <div class="logo">
      <a href="../index.html" class="logo-link">
        <span class="logo-mark">ZL</span>
        <span class="logo-text">ZHLIN PHOTOGRAPHY</span>
      </a>
    </div>
    <nav class="main-nav" aria-label="Main Navigation">
      <a href="../index.html">ABOUT ME</a>
      <a href="index.html" class="nav-active">PHOTOGRAPHY</a>
      <a href="../hobby/index.html">HOBBY</a>
      <a href="../travel/index.html">TRAVEL</a>
      <a href="../contact/index.html" class="nav-contact">CONTACT</a>
    </nav>
  </header>

  <main class="content content--wide">
    <section class="section photography-intro">
      <h1 class="section-heading">Photography</h1>
      <p class="section-desc" id="photography-intro">Selected photography with notes on place, light, and time.</p>
    </section>

    <ul class="photo-gallery" id="photo-gallery" aria-label="Photography Gallery"></ul>

    <div class="photo-lightbox" id="photo-lightbox" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Photo preview">
      <button type="button" class="photo-lightbox-nav photo-lightbox-nav--prev" id="photo-lightbox-prev" aria-label="Previous photo">‹</button>
      <button type="button" class="photo-lightbox-nav photo-lightbox-nav--next" id="photo-lightbox-next" aria-label="Next photo">›</button>
      <button type="button" class="photo-lightbox-close" id="photo-lightbox-close" aria-label="Close preview">×</button>
      <div class="photo-lightbox-backdrop" data-lightbox-close="true"></div>
      <figure class="photo-lightbox-figure">
        <img id="photo-lightbox-image" src="" alt="">
        <figcaption class="photo-lightbox-caption">
          <p class="photo-lightbox-title" id="photo-lightbox-title"></p>
          <p class="photo-lightbox-subtitle" id="photo-lightbox-subtitle"></p>
          <p class="photo-lightbox-location" id="photo-lightbox-location"></p>
          <p class="photo-lightbox-date" id="photo-lightbox-date"></p>
        </figcaption>
      </figure>
    </div>
  </main>

  <footer class="site-footer">
    <button type="button" class="theme-toggle" id="theme-toggle" aria-label="切换深色/浅色模式">
      <span class="theme-label">浅色</span>
    </button>
  </footer>

  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="../script.js"></script>
</body>
</html>
