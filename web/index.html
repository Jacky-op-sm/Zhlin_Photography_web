<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zhlin Photography</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="logo">
      <a href="index.html" class="logo-link">
        <span class="logo-mark">ZL</span>
        <span class="logo-text">ZHLIN PHOTOGRAPHY</span>
      </a>
    </div>
    <nav class="main-nav">
      <a href="index.html" class="nav-active">ABOUT ME</a>
      <a href="photography/index.html">PHOTOGRAPHY</a>
      <a href="hobby/index.html">HOBBY</a>
      <a href="travel/index.html">TRAVEL</a>
      <a href="contact/index.html" class="nav-contact">CONTACT</a>
    </nav>
  </header>

  <main class="content">
    <section class="section about-section">
      <h1 class="name">Your Name</h1>
      <p class="title-line">PhD Student · Photographer</p>
      <div class="about-block">
        <div class="avatar-wrap">
          <div class="avatar" role="img" aria-label="个人头像">
            <img src="头像.jpeg" alt="个人头像">
          </div>
        </div>
        <div class="about-text">
          <p>这里可以写一段个人简介，介绍你的背景、摄影经历以及你希望访客了解的内容。保持简洁，突出个性与专业方向。</p>
          <p>第二段可以补充更多关于你的故事、创作理念或与社区、客户的互动方式。</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <p class="footer-text">© 2025 Zhlin Photography. All rights reserved.</p>
      <div class="social-links">
        <a href="mailto:your@email.com" class="social-link">Email</a>
        <span class="social-separator">·</span>
        <a href="#" class="social-link">Instagram</a>
        <span class="social-separator">·</span>
        <a href="#" class="social-link">WeChat</a>
      </div>
    </div>
    <button type="button" class="theme-toggle" id="theme-toggle" aria-label="切换深色/浅色模式">
      <span class="theme-label">浅色</span>
    </button>
  </footer>

  <script src="script.js"></script>
</body>
</html>
